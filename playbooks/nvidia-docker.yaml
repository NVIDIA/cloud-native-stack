- hosts: all
  become: true
  become_method: sudo
  vars_files:
    - cns_values.yaml
  vars:
    daemon_json:
      default-runtime: nvidia
      runtimes:
        nvidia:
          path: /usr/bin/nvidia-container-runtime
          runtimeArgs: []
  tasks:
    - name: Check docker is installed
      shell: docker
      register: docker_exists
      no_log: true
      failed_when: false
      retries: 5
      delay: 5
      until: docker_exists is succeeded

    - name: Check NVIDIA docker is installed
      shell: nvidia-docker
      register: nvidia_docker_exists
      no_log: true
      failed_when: false
      retries: 5
      delay: 5
      until: nvidia_docker_exists is succeeded

    - name: Install Docker Dependencies on Ubuntu
      when: docker_exists.rc >= 1 and ansible_facts['distribution'] == 'Ubuntu' or nvidia_docker_exists.rc >= 1 and ansible_facts['distribution'] == 'Ubuntu'
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - lsb-release
          - gnupg
          - apt-utils
          - unzip
        state: latest
        update_cache: true
      retries: 5
      delay: 5
      register: install_docker_deps_ubuntu
      until: install_docker_deps_ubuntu is succeeded

    - name: Install Docker Dependencies on RHEL
      when: docker_exists.rc >= 1 and ansible_facts['distribution'] == 'RedHat' or nvidia_docker_exists.rc >= 1 and ansible_facts['distribution'] == 'RedHat'
      yum:
        name:
          - yum-utils
          - device-mapper-persistent-data
          - lvm2
          - unzip
        state: latest
        update_cache: true
      retries: 5
      delay: 5
      register: install_docker_deps_rhel
      until: install_docker_deps_rhel is succeeded

    - name: Create Docker APT keyring directory
      when: ansible_facts['distribution'] == 'Ubuntu'
      become: true
      file: 
        path: /etc/apt/keyrings
        mode: '0755'
        state: directory
      retries: 5
      delay: 5
      register: create_docker_keyring_dir
      until: create_docker_keyring_dir is succeeded

    - name: Add Docker APT signing key
      when: docker_exists.rc >= 1 and ansible_facts['distribution'] == 'Ubuntu'
      become: true
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg"
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'
      retries: 5
      delay: 5
      register: add_docker_key
      until: add_docker_key is succeeded

    - name: Add Docker repository into sources list
      when: docker_exists.rc >= 1 and ansible_facts['distribution'] == 'Ubuntu'
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ docker_apt_arch }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }} {{ ansible_facts['distribution_release'] }} stable"
        state: present
        filename: docker
      retries: 5
      delay: 5
      register: add_docker_repo
      until: add_docker_repo is succeeded

    - name: Add Docker repo on RHEL
      when: docker_exists.rc >= 1 and ansible_facts['distribution'] == 'RedHat'
      get_url:
        url: https://download.docker.com/linux/centos/docker-ce.repo
        dest: /etc/yum.repos.d/docer-ce.repo
      retries: 5
      delay: 5
      register: add_docker_repo_rhel
      until: add_docker_repo_rhel is succeeded

    - name: Create docker systemd file
      when: docker_exists.rc >= 1 and microk8s == true
      become: true
      copy:
        dest: /lib/systemd/system/docker.service
        content: |
          [Unit]
          Description=Docker Application Container Engine
          Documentation=https://docs.docker.com
          After=network-online.target docker.socket firewalld.service snap.microk8s.daemon-containerd.service
          Wants=network-online.target
          Requires=docker.socket snap.microk8s.daemon-containerd.service

          [Service]
          Type=notify
          ExecStart=/usr/bin/dockerd -H unix:// --containerd=/var/snap/microk8s/common/run/containerd.sock
          ExecReload=/bin/kill -s HUP $MAINPID
          TimeoutSec=0
          RestartSec=2
          Restart=always
          StartLimitBurst=3
          StartLimitInterval=60s
          LimitNOFILE=infinity
          LimitNPROC=infinity
          LimitCORE=infinity
          TasksMax=infinity
          Delegate=yes
          KillMode=process
          OOMScoreAdjust=-500
          [Install]
          WantedBy=multi-user.target
      retries: 5
      delay: 5
      register: create_docker_systemd_microk8s
      until: create_docker_systemd_microk8s is succeeded

    - name: Create docker systemd file
      when: docker_exists.rc >= 1 and microk8s == false
      become: true
      copy:
        dest: /etc/systemd/system/docker.service
        content: |
          [Unit]
          Description=Docker Application Container Engine
          Documentation=https://docs.docker.com
          After=network-online.target docker.socket firewalld.service containerd.service
          Wants=network-online.target
          Requires=docker.socket containerd.service

          [Service]
          Type=notify
          ExecStart=/usr/bin/dockerd -H unix:// --containerd=/run/containerd/containerd.sock
          ExecReload=/bin/kill -s HUP $MAINPID
          TimeoutSec=0
          RestartSec=2
          Restart=always
          StartLimitBurst=3
          StartLimitInterval=60s
          LimitNOFILE=infinity
          LimitNPROC=infinity
          LimitCORE=infinity
          TasksMax=infinity
          Delegate=yes
          KillMode=process
          OOMScoreAdjust=-500
          [Install]
          WantedBy=multi-user.target
      retries: 5
      delay: 5
      register: create_docker_systemd
      until: create_docker_systemd is succeeded

    - name: Install Docker on Ubuntu
      when: docker_exists.rc >= 1 and ansible_facts['distribution'] == 'Ubuntu' and microk8s == false
      ansible.builtin.apt:
        name:
          - "docker-ce={{ docker_ce_apt_version }}"
          - "docker-ce-cli={{ docker_ce_apt_version }}"
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true
        allow_downgrade: true
      retries: 5
      delay: 5
      register: install_docker_ubuntu
      until: install_docker_ubuntu is succeeded

    - name: Install Docker on Ubuntu
      when: docker_exists.rc >= 1 and ansible_facts['distribution'] == 'Ubuntu' and microk8s == true
      ansible.builtin.apt:
        name:
          - "docker-ce={{ docker_ce_apt_version }}"
          - "docker-ce-cli={{ docker_ce_apt_version }}"
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true
        allow_downgrade: true
      retries: 5
      delay: 5
      register: install_docker_ubuntu_microk8s
      until: install_docker_ubuntu_microk8s is succeeded

    - name: Install Docker on RHEL
      when: docker_exists.rc >= 1 and ansible_facts['distribution'] == 'RedHat'
      yum:
        name: ['docker-ce', 'docker-ce-cli', 'docker-buildx-plugin', 'docker-compose-plugin']
        state: latest
        allowerasing: true
        update_cache: true
      retries: 5
      delay: 5
      register: install_docker_rhel
      until: install_docker_rhel is succeeded

    - name: remove nvidia-docker on RHEL
      when: nvidia_docker_exists.rc == 0 and ansible_facts['distribution'] == 'RedHat'
      yum:
        name:
          - nvidia-docker
          - nvidia-docker2
        state: absent
        autoremove: yes
      retries: 5
      delay: 5
      register: remove_nvidia_docker_rhel
      until: remove_nvidia_docker_rhel is succeeded

    - name: remove nvidia-docker v1
      when: nvidia_docker_exists.rc == 0 and ansible_facts['distribution'] == 'Ubuntu'
      apt:
        name: nvidia-docker
        state: absent
        purge: yes
      retries: 5
      delay: 5
      register: remove_nvidia_docker_ubuntu
      until: remove_nvidia_docker_ubuntu is succeeded

    - name: Add NVIDIA Docker apt signing key for Ubuntu
      when: nvidia_docker_exists.rc >= 1 and ansible_facts['distribution'] == 'Ubuntu'
      become: true
      get_url:
        url: https://nvidia.github.io/libnvidia-container/gpgkey
        dest: /tmp/nvidia-container-toolkit-keyring.asc
        mode: '0644'
      retries: 5
      delay: 5
      register: download_nvidia_docker_key
      until: download_nvidia_docker_key is succeeded

    - name: Check NVIDIA Container Toolkit apt signing keyring for Ubuntu
      when: nvidia_docker_exists.rc >= 1 and ansible_facts['distribution'] == 'Ubuntu'
      become: true
      stat:
        path: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
      register: nvidia_docker_keyring

    - name: Add NVIDIA Container Toolkit apt signing key for Ubuntu
      when:
        - nvidia_docker_exists.rc >= 1
        - ansible_facts['distribution'] == 'Ubuntu'
        - download_nvidia_docker_key.changed or not nvidia_docker_keyring.stat.exists
      become: true
      command: gpg --dearmor --yes -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg /tmp/nvidia-container-toolkit-keyring.asc
      retries: 5
      delay: 5
      register: add_nvidia_docker_key
      until: add_nvidia_docker_key is succeeded

    - name: Set NVIDIA Container Toolkit apt signing key permissions for Ubuntu
      when: nvidia_docker_exists.rc >= 1 and ansible_facts['distribution'] == 'Ubuntu'
      become: true
      file:
        path: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
        mode: '0644'

    - name: Get NVIDIA Container Toolkit Apt list
      when: nvidia_docker_exists.rc >= 1 and ansible_facts['distribution'] == 'Ubuntu'
      apt_repository:
        repo: "{{ item }}"
        state: present
        filename: libnvidia-container.list
      with_items:
        - deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://nvidia.github.io/libnvidia-container/stable/ubuntu18.04/$(ARCH) /
        - deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://nvidia.github.io/libnvidia-container/stable/deb/$(ARCH) /
      retries: 5
      delay: 5
      register: get_nvidia_container_toolkit_apt
      until: get_nvidia_container_toolkit_apt is succeeded

    - name: add NVIDIA Container Toolkit repo on RHEL
      when: nvidia_docker_exists.rc >= 1 and ansible_facts['distribution'] == 'RedHat'
      get_url:
        url:   https://nvidia.github.io/libnvidia-container/stable/rpm/nvidia-container-toolkit.repo 
        dest: /etc/yum.repos.d/nvidia-container-toolkit.repo
        mode: 0644
        owner: root
        group: root
      retries: 5
      delay: 5
      register: add_nvidia_container_toolkit_repo_rhel
      until: add_nvidia_container_toolkit_repo_rhel is succeeded

    - name: Remove old nvidia container tooklit
      when: nvidia_docker_exists.rc >= 1
      failed_when: false
      apt:
        name: ['nvidia-container-toolkit*', 'nvidia-container-runtime*', 'libnvidia-container*']
        state: absent
        autoremove: yes
      retries: 5
      delay: 5
      register: remove_old_nvidia_container_toolkit
      until: remove_old_nvidia_container_toolkit is succeeded

    - name: Install NVIDIA Docker and NVIDIA Container Runtime
      when: nvidia_docker_exists.rc >= 1 and ansible_facts['distribution'] == 'Ubuntu'
      apt:
        name: ['nvidia-container-toolkit={{ nvidia_container_toolkit_version }}-1', 'nvidia-container-toolkit-base={{ nvidia_container_toolkit_version }}-1', 'libnvidia-container-tools={{ nvidia_container_toolkit_version }}-1', 'libnvidia-container1={{ nvidia_container_toolkit_version }}-1']
        state: present
        update_cache: true
      retries: 5
      delay: 5
      register: install_nvidia_docker_ubuntu
      until: install_nvidia_docker_ubuntu is succeeded

    - name: install NVIDIA container runtime and NVIDIA Docker on RHEL
      when: nvidia_docker_exists.rc >= 1 and cns_version >= 10.0 and ansible_facts['distribution'] == 'RedHat'
      yum:
        name: ['nvidia-container-toolkit', 'nvidia-docker2']
        state: present
        update_cache: yes
      retries: 5
      delay: 5
      register: install_nvidia_docker_rhel
      until: install_nvidia_docker_rhel is succeeded

    - name: Create "docker" group
      when: docker_exists.rc >= 1
      become: true
      group:
        name: docker
        state: present
      retries: 5
      delay: 5
      register: create_docker_group
      until: create_docker_group is succeeded

    - name: Add remote "ubuntu" user to "docker" group
      when: docker_exists.rc >= 1
      become: true
      user:
        name: "{{ ansible_facts['user_id'] }}"
        groups: docker
        append: yes
      retries: 5
      delay: 5
      register: add_user_to_docker_group
      until: add_user_to_docker_group is succeeded


    - name: Configure CDI for Docker/Containerd
      shell: "nvidia-ctk runtime configure --runtime docker --cdi.enabled --nvidia-set-as-default; nvidia-ctk runtime configure --runtime containerd --cdi.enabled --nvidia-set-as-default; nvidia-ctk config --config-file /usr/local/nvidia/toolkit/.config/nvidia-container-runtime/config.toml --in-place --set accept-nvidia-visible-devices-as-volume-mounts=true"
      become: true
      when: nvidia_docker_exists.rc >= 1 and container_runtime == 'cri-docker' or nvidia_docker_exists.rc >= 1 and container_runtime == 'containerd' 
      ignore_errors: true
      retries: 5
      delay: 5
      register: configure_cdi
      until: configure_cdi is succeeded

    - name: Configure CDI for CRI-O Container Runtime
      shell: nvidia-ctk runtime configure --runtime crio --cdi.enabled --nvidia-set-as-default
      become: true
      when: nvidia_docker_exists.rc >= 1 and container_runtime == 'cri-o' 
      ignore_errors: true
      retries: 5
      delay: 5
      register: configure_cdi
      until: configure_cdi is succeeded

    - name: Configure CRI-O NVIDIA runtime monitor path
      become: true
      when: nvidia_docker_exists.rc >= 1 and container_runtime == 'cri-o'
      lineinfile:
        path: /etc/crio/crio.conf.d/99-nvidia.toml
        regexp: '^\s*monitor_path = ""'
        line: '        monitor_path = "/usr/libexec/crio/conmon"'
      retries: 5
      delay: 5
      register: configure_crio_nvidia_monitor
      until: configure_crio_nvidia_monitor is succeeded

    - name: Configure GPU Operator NVIDIA Driver for Nvidia Container Runtime
      become: true
      when: cns_nvidia_driver == false
      ignore_errors: true
      lineinfile:
        path: /etc/nvidia-container-runtime/config.toml
        regexp: '#root = "/run/nvidia/driver"'
        line: 'root = "/run/nvidia/driver"'
      retries: 5
      delay: 5
      register: configure_nvidia_driver
      until: configure_nvidia_driver is succeeded

    - name: Reload the configurations
      when: install_k8s != true or microk8s == true
      become: true
      block:
       - name: reload daemon
         systemd_service:
           daemon_reload: true
         failed_when: false
         retries: 5
         delay: 5
         register: reload_daemon
         until: reload_daemon is succeeded

       - name: reset failed Docker units
         when: container_runtime == 'cri-dockerd'
         failed_when: false
         command: systemctl reset-failed docker.service docker.socket cri-docker.service cri-docker.socket
         retries: 5
         delay: 5
         register: reset_failed_docker_units
         until: reset_failed_docker_units is succeeded

       - name: restart docker service
         when: container_runtime == 'cri-dockerd'
         failed_when: false
         systemd_service:
           name: docker
           state: restarted
         retries: 5
         delay: 5
         register: restart_docker
         until: restart_docker is succeeded

       - name: restart cri-docker service
         when: container_runtime == 'cri-dockerd'
         failed_when: false
         systemd_service:
           name: cri-docker
           state: restarted
         retries: 5
         delay: 5
         register: restart_cri_docker
         until: restart_cri_docker is succeeded

       - name: restart containerd service
         when: container_runtime == 'containerd'
         failed_when: false
         systemd_service:
           name: containerd
           state: restarted
         retries: 5
         delay: 5
         register: restart_containerd
         until: restart_containerd is succeeded

       - name: restart CRI-O services
         when: container_runtime == 'cri-o'
         failed_when: false
         systemd_service:
           name: "{{ item }}"
           state: restarted
         with_items:
           - crio
           - cri-o
         retries: 5
         delay: 5
         register: restart_crio_services
         until: restart_crio_services is succeeded

       - name: restart kubelet service
         failed_when: false
         systemd_service:
           name: kubelet
           state: restarted
         retries: 5
         delay: 5
         register: restart_kubelet
         until: restart_kubelet is succeeded

    - name: Download NGC CLI
      when: ansible_facts['architecture'] == 'x86_64'
      get_url:
        url: https://api.ngc.nvidia.com/v2/resources/nvidia/ngc-apps/ngc_cli/versions/4.10.0/files/ngccli_linux.zip
        dest: /tmp/ngccli_linux.zip
        mode: 0664
      retries: 5
      delay: 5
      register: download_ngc_cli
      until: download_ngc_cli is succeeded

    - name: Download NGC CLI
      when: ansible_facts['architecture'] == 'aarch64'
      get_url:
        url: https://api.ngc.nvidia.com/v2/resources/nvidia/ngc-apps/ngc_cli/versions/4.10.0/files/ngccli_arm64.zip
        dest: /tmp/ngccli_linux.zip
        mode: 0664
      retries: 5
      delay: 5
      register: download_ngc_cli
      until: download_ngc_cli is succeeded

    - name: NGC CLI Setup
      block:
        - name: Install NGC CLI
          unarchive:
            src: /tmp/ngccli_linux.zip
            dest: "{{ ansible_facts['user_dir'] }}/"
            remote_src: yes
          retries: 5
          delay: 5
          register: install_ngc_cli
          until: install_ngc_cli is succeeded

        - name: Ensure ngc file is executable
          file:
            path: "{{ ansible_facts['user_dir'] }}/ngc-cli/ngc"
            mode: '0755'
            state: file
          retries: 5
          delay: 5
          register: change_ngc_permission
          until: change_ngc_permission is succeeded

        - name: Ensure ngc-cli path is in bashrc
          lineinfile:
            path: "{{ ansible_facts['user_dir'] }}/.bashrc"
            insertafter: EOF
            regexp: "^(export )?PATH=.*{{ ansible_facts['user_dir'] }}/ngc-cli/?(:|$)"
            line: "export PATH=$PATH:{{ ansible_facts['user_dir'] }}/ngc-cli"
            state: present
          retries: 5
          delay: 5
          register: add_path_to_bashrc
          until: add_path_to_bashrc is succeeded
