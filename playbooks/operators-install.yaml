     register: enable_mig_profile
     until: enable_mig_profile is succeeded

   - name: GPU Operator Changes with CRI Docker Runtime
     shell: 'sleep 60; kubectl get clusterpolicy cluster-policy -o yaml | sed "/validator:/a\    driver:\n      env:\n      - name: DISABLE_DEV_CHAR_SYMLINK_CREATION\n        value: \"true\"" | kubectl apply -f -'
     when: "enable_gpu_operator == true and container_runtime == 'cri-dockerd'"
     retries: 5
     delay: 5
     register: gpu_operator_cri_docker_changes
     until: gpu_operator_cri_docker_changes is succeeded

   - name: Container Networking Plugin changes
     when: "enable_gpu_operator == true"
     shell: "sleep 20; timeout 15 kubectl delete pods $(kubectl get pods -n kube-system | grep core | awk '{print $1}') -n kube-system; for ns in `kubectl get pods -A  | grep node-feature | grep -v master | awk '{print $1}'`; do kubectl get pods -n $ns  | grep node-feature | grep -v master | awk '{print $1}' | xargs kubectl delete pod -n $ns; done"
     retries: 5
     delay: 5
     register: container_networking_changes
     until: container_networking_changes is succeeded

   - name: add nvidia-smi alias
     when: "cns_nvidia_driver == false"
     lineinfile:
       path: "{{ ansible_facts['user_dir'] }}/.bashrc"
       regexp: '^alias nvidia-smi='
       line: "alias nvidia-smi='sudo chroot /run/nvidia/driver nvidia-smi'"
       state: present
     retries: 5
     delay: 5
     register: add_nvidia_smi_alias
     until: add_nvidia_smi_alias is succeeded

   - name: Install NIM Operator
     shell: "helm upgrade --install nim-operator nvidia/k8s-nim-operator --version {{ nim_operator_version }} --create-namespace --namespace nim-operator -n nim-operator"
     when: "enable_nim_operator == true"
     retries: 5
     delay: 5
     register: install_nim_operator
     until: install_nim_operator is succeeded

   - name: Create NSight Operator custom values
     when: "enable_nsight_operator == true"
     copy:
       src: "{{lookup('pipe', 'pwd')}}/files/nsight_custom_values.yaml"
       dest: "{{ ansible_facts['user_dir'] }}/nsight_custom_values.yaml"
     retries: 5
     delay: 5
     register: create_nsight_custom_values
     until: create_nsight_custom_values is succeeded

   # The nsight-operator chart references gateway.networking.k8s.io/v1
   # Gateway and GatewayClass kinds (for the TURN gateway / STUNner). The
   # Gateway API isn't part of stock Kubernetes, so the helm install fails
   # with "no matches for kind Gateway in version gateway.networking.k8s.io/v1
   # — ensure CRDs are installed first" unless we apply the CRDs upfront.
   - name: Install Gateway API CRDs (required by NSight Operator)
     when: "enable_nsight_operator == true"
     shell: kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.0.0/standard-install.yaml
     retries: 5
     delay: 5
     register: install_gateway_api_crds
     until: install_gateway_api_crds is succeeded

   - name: Install NSight Operator
     shell: "helm install -f {{ ansible_facts['user_dir'] }}/nsight_custom_values.yaml nsight-operator --create-namespace --namespace nsight-operator https://helm.ngc.nvidia.com/nvidia/devtools/charts/nsight-operator-{{ nsight_operator_version }}.tgz"
     when: "enable_nsight_operator == true"
     retries: 5
     delay: 5
     register: install_nsight_operator
     until: install_nsight_operator is succeeded

   - name: Install NVIDIA Kubernetes AI Scheduler
     shell: helm upgrade -i kai-scheduler oci://ghcr.io/kai-scheduler/kai-scheduler/kai-scheduler -n kai-scheduler --create-namespace --version v{{ kai_scheduler_version }} --set "global.gpuSharing=true"
     when: enable_kai_scheduler == true
