- hosts: master
  vars_files:
    - cns_values.yaml
  tasks:
   - name: Validate whether Kubernetes cluster installed
     shell: kubectl cluster-info
     register: k8sup
     no_log: True
     failed_when: false
     retries: 5
     delay: 5
     until: k8sup is succeeded

   - name: Checking Nouveau is disabled
     become: true
     command: lsmod | grep nouveau
     register: nouveau_result
     failed_when: false
     retries: 5
     delay: 5
     until: nouveau_result is succeeded

   - name: Alert
     when: nouveau_result.rc != 1
     failed_when: false
     debug:
       msg: "Please reboot the host and run the same command again"
     retries: 5
     delay: 5
     register: alert_nouveau
     until: alert_nouveau is succeeded

   - name: check DNS access
     shell: |
       kubectl delete pod dnsutils > /dev/null
       kubectl apply -f https://k8s.io/examples/admin/dns/dnsutils.yaml > /dev/null
       status=$(kubectl get pods dnsutils | awk '{print $3}' | grep -v STATUS)
       while [ $status != 'Running' ]
       do
         sleep 10
         status=$(kubectl get pods dnsutils | awk '{print $3}' | grep -v STATUS)
       done
       kubectl exec -i -t dnsutils -- nslookup archive.ubuntu.com | grep 'Name:' | uniq | awk '{print $NF}' | head -n1
     register: dns_check
     retries: 5
     delay: 5
     until: dns_check is succeeded

   - name: DNS Alert
     debug:
       msg: "Looks like your system network doesn't reachable to archive.ubuntu.com, please update your DNS settings to proceed further"
     when: '"archive.ubuntu.com" not in dns_check.stdout'
     failed_when: true
     retries: 5
     delay: 5
     register: dns_alert
     until: dns_alert is succeeded

   - name: Check NVIDIA Driver Modules are loaded
     shell: "lsmod | grep -i nvidia"
     register: nvidia_mod
     no_log: True
     ignore_errors: true
     failed_when: false
     retries: 5
     delay: 5
     until: nvidia_mod is succeeded

   - name: Check NVIDIA SMI loaded
     shell: "nvidia-smi"
     register: nvidia_smi
     no_log: True
     ignore_errors: true
     failed_when: false
     retries: 5
     delay: 5
     until: nvidia_smi is succeeded

   - name: NVIDIA Driver Alert
     debug:
       msg: "NVIIDA Driver is installed on the system, please uninstall the NVIDIA Driver and continue the installation. Example: 'sudo /usr/bin/nvidia-uninstall'"
     when: cns_nvidia_driver != true and nvidia_mod.rc > 1 or cns_nvidia_driver != true and nvidia_smi.rc == 0
     ignore_errors: true
     failed_when: false
     retries: 5
     delay: 5
     register: nvidia_driver_alert
     until: nvidia_driver_alert is succeeded

   - name: GPU PCI ID
     shell: lspci | grep -i nvidia | awk '{print $1}' | head -n1
     failed_when: false
     register: pci
     retries: 5
     delay: 5
     until: pci is succeeded

   - name: Reload the CRI-O service
     when: container_runtime == 'cri-o'
     become: true
     systemd:
       state: restarted
       name: "{{ item }}"
     with_items:
       - crio
       - cri-o
     retries: 5
     delay: 5
     register: reload_crio
     until: reload_crio is succeeded

   - name: Label the Kubernetes nodes as worker
     failed_when: false
     command: 'kubectl label nodes --all node-role.kubernetes.io/worker='
     retries: 5
     delay: 5
     register: label_worker_nodes
     until: label_worker_nodes is succeeded

   - name: Checking if Network Operator is installed
     shell: helm ls -A | grep network-operator
     register: network_operator
     failed_when: false
     no_log: True
     retries: 5
     delay: 5
     until: network_operator is succeeded

   - name: Validate Network Operator Kubernetes support
     when:
       - enable_network_operator == true
       - k8s_version is not version('1.31.0', '>=') or k8s_version is not version('1.36.0', '<')
     fail:
       msg: |
         Unsupported Network Operator and Kubernetes combination.

         Network Operator {{ network_operator_version }} supports Kubernetes 1.31 through 1.35.
         CNS {{ cns_version }} is configured to install Kubernetes {{ k8s_version }}.

         Please use a CNS/Kubernetes version supported by Network Operator {{ network_operator_version }},
         or disable Network Operator for this install.

   - name: Report Network Operator Kubernetes support
     when:
       - enable_network_operator == true
       - k8s_version is version('1.31.0', '>=') and k8s_version is version('1.36.0', '<')
     debug:
       msg: "Network Operator {{ network_operator_version }} is supported with Kubernetes {{ k8s_version }}."

   - name: Set GPU Operator RDMA mode for Network Operator managed OFED
     when: "enable_network_operator == true and deploy_ofed == true and enable_rdma == true"
     set_fact:
       gpu_operator_network_rdma_set: "{{ '' if network_operator_version is version('26.4.0', '>=') else 'driver.rdma.enabled=true,' }}"

   - name: Get the Active Mellanox NIC on master
     when: "enable_network_operator == true"
     become: true
     failed_when: false
     shell: "touch /tmp/$(hostname)-nic; for device in `lshw -class network -short | grep -i ConnectX | awk '{print $2}' | egrep -v 'Device|path' | sed '/^$/d'`;do echo -n $device; ethtool $device | grep -i 'Link detected'; done | awk '{print $1}' | grep 'en' > /tmp/$(hostname)-nic"
     retries: 5
     delay: 5
     register: get_mellanox_nic
     until: get_mellanox_nic is succeeded

   - name: List Mellanox Active NICs
     when: "enable_network_operator == true"
     failed_when: false
     shell: "for list in `ls -lrt /tmp/*nic | awk '{print $NF}'`; do cat $list | tr '\n' ','; done | sed 's/.$//'"
     register: active_nic
     retries: 5
     delay: 5
     until: active_nic is succeeded

   - name: Copy files to master
     when: "enable_network_operator == true"
     no_log: true
     copy:
       src: "{{ item }}"
       dest: "{{ ansible_facts['user_dir'] }}/"
     with_fileglob:
       - "{{lookup('pipe', 'pwd')}}/files/network-operator-values.yaml"
       - "{{lookup('pipe', 'pwd')}}/files/network-operator-value.yaml"
       - "{{lookup('pipe', 'pwd')}}/files/networkdefinition.yaml"
       - "{{lookup('pipe', 'pwd')}}/files/mellanox-test.yaml"
     retries: 5
     delay: 5
     register: copy_network_files
     until: copy_network_files is succeeded

   - name: Download Mellanox NIC Cluster Policy YAML
     when: "enable_network_operator == true"
     ansible.builtin.get_url:
       url: "https://raw.githubusercontent.com/Mellanox/network-operator/refs/tags/v{{ network_operator_version }}/example/crs/mellanox.com_v1alpha1_nicclusterpolicy_cr.yaml"
       dest: "/tmp/mellanox_nic_policy.yaml"
       mode: '0666'
     register: download_mellanox_nic_policy
     until: download_mellanox_nic_policy is succeeded
     retries: 5
     delay: 5

   - name: Update Mellanox Cluster Policy
     when: "enable_network_operator == true"
     ansible.builtin.shell: |
       sed -i 's/nvstaging/nvidia/g' /tmp/mellanox_nic_policy.yaml
       sed -i '/^spec:$/a\{% raw %}{% if deploy_ofed %}{% endraw %}' /tmp/mellanox_nic_policy.yaml
       sed -i '/^  rdmaSharedDevicePlugin:/i\{% raw %}{% endif %}{% endraw %}' /tmp/mellanox_nic_policy.yaml
     retries: 5
     delay: 5
     register: update_mellanox_cluster_policy
     until: update_mellanox_cluster_policy is succeeded

   - name: Generate NIC Cluster Policy template
     when: "enable_network_operator == true"
     copy:
       src: "/tmp/mellanox_nic_policy.yaml"
       dest: "{{ ansible_facts['user_dir'] }}/nic-cluster-policy.yaml.j2"
     retries: 5
     delay: 5
     register: generate_nic_policy
     until: generate_nic_policy is succeeded

   - name: Create final NIC Cluster Policy configuration
     when: "enable_network_operator == true"
     ansible.builtin.template:
       src: "{{ ansible_facts['user_dir'] }}/nic-cluster-policy.yaml.j2"
       dest: "{{ ansible_facts['user_dir'] }}/nic-cluster-policy.yaml"
     retries: 5
     delay: 5
     register: create_nic_policy
     until: create_nic_policy is succeeded

   - name: Installing the Network Operator on NVIDIA Cloud Native Stack
     when: "enable_network_operator == true and cns_version >= 4.1"
     shell: "{{ item }}"
     with_items:
        - helm repo add mellanox '{{ helm_repository }}' --force-update
        - helm repo update
        - kubectl label nodes --all node-role.kubernetes.io/master- --overwrite
     retries: 5
     delay: 5
     register: install_network_operator
     until: install_network_operator is succeeded

   - name: Installing the Network Operator on NVIDIA Cloud Native Stack
     when: "enable_network_operator == true"
     shell: |
       helm upgrade --install network-operator mellanox/network-operator \
         --version {{ network_operator_version }} \
         -f {{ ansible_facts['user_dir'] }}/network-operator-value.yaml \
         -n network-operator --create-namespace --timeout 30m
       kubectl -n network-operator rollout status deployment/network-operator --timeout=10m
       kubectl -n network-operator rollout status deployment/network-operator-node-feature-discovery-master --timeout=10m
       kubectl -n network-operator rollout status deployment/network-operator-node-feature-discovery-gc --timeout=10m
       kubectl -n network-operator rollout status daemonset/network-operator-node-feature-discovery-worker --timeout=10m
     retries: 5
     delay: 5
     register: install_network_operator_x86_new
     until: install_network_operator_x86_new is succeeded

   - name: Applying the NIC Cluster Policy on NVIDIA Cloud Native Stack
     when: "enable_network_operator == true"
     shell: "kubectl apply -f {{ ansible_facts['user_dir'] }}/nic-cluster-policy.yaml"
     retries: 5
     delay: 5
     register: apply_nic_policy
     until: apply_nic_policy is succeeded

   - name: Checking if GPU Operator is installed
     shell: helm ls -A | grep gpu-operator
     register: gpu_operator
     failed_when: false
     no_log: True
     retries: 5
     delay: 5
     until: gpu_operator is succeeded

   - name: Checking if Network Operator is installed
     shell: helm ls -A | grep network-operator
     register: network_operator_valid
     failed_when: false
     no_log: True
     retries: 5
     delay: 5
     until: network_operator_valid is succeeded

   - name: Add nvidia Helm repo
     shell: " {{ item }}"
     with_items:
        - helm repo add nvidia '{{ helm_repository }}' --force-update
        - helm repo update
     when: 'ngc_registry_password == ""'
     retries: 5
     delay: 5
     register: add_nvidia_helm_repo
     until: add_nvidia_helm_repo is succeeded

   - name: Add custom Helm repo
     shell: " {{ item }}"
     with_items:
        - helm repo add nvidia '{{ helm_repository }}' --force-update --username=\$oauthtoken --password='{{ ngc_registry_password }}'
        - helm repo update
     when: 'ngc_registry_password != ""'
     retries: 5
     delay: 5
     register: add_custom_helm_repo
     until: add_custom_helm_repo is succeeded

   - name: Get the GPU Operator Values.yaml
     shell: helm show --version=v{{ gpu_operator_version }} values '{{ gpu_operator_helm_chart }}' > {{ ansible_facts['user_dir'] }}/values.yaml
     when: "enable_gpu_operator == true"
     retries: 5
     delay: 5
     register: get_gpu_operator_values
     until: get_gpu_operator_values is succeeded

   - name: Get Host IP
     shell: ip route get 1 | awk '{print $7; exit}' | tr -d '\n'
     register: network
     retries: 5
     delay: 5
     until: network is succeeded

   - name: create GPU Custom Values for proxy
     when: proxy == true
     replace:
       dest: "{{ ansible_facts['user_dir'] }}/values.yaml"
       regexp: '  env: \[\]'
       replace: "  env:\n    - name: HTTPS_PROXY\n      value: {{ https_proxy }}\n    - name: HTTP_PROXY\n      value: {{ http_proxy }}\n    - name: https_proxy\n      value: {{ https_proxy }}\n    - name: http_proxy\n      value: {{ http_proxy }}\n    - name: NO_PROXY\n      value: {{ network.stdout }},localhost,127.0.0.0/8,10.96.0.1/24,10.244.0.0/16,192.168.32.0/22,{{ subnet.stdout }}.0/24\n    - name: no_proxy\n      value: {{ network.stdout }},localhost,127.0.0.0/8,10.96.0.1/24,10.244.0.0/16,192.168.32.0/22,{{ subnet.stdout }}.0/24"
     retries: 5
     delay: 5
     register: create_gpu_proxy_values
     until: create_gpu_proxy_values is succeeded

   - name: Trim the GPU Driver Version
     shell: "echo {{ gpu_driver_version }} | awk -F'.' '{print $1}'"
     register: dversion
     retries: 5
     delay: 5
     until: dversion is succeeded

   - set_fact:
       driver_version: "{{ dversion.stdout }}"
     retries: 5
     delay: 5
     register: set_driver_version
     until: set_driver_version is succeeded

   # ============================================================
   # Confidential Computing — Kata + CoCo (Steps 7, 8, 10)
   # Vendor support: kata-deploy installs runtime classes for BOTH
   #   - Intel TDX  → kata-qemu-nvidia-gpu-tdx
   #   - AMD SNP    → kata-qemu-nvidia-gpu-snp
   # The install steps below are vendor-agnostic. The vendor only
   # matters at workload time (runtimeClassName), handled in the
   # Step 11 validation block. Note: microk8s is NOT supported (per Step 7).
   # Refs:
   #   Step 7  https://nvidia.atlassian.net/wiki/spaces/~fguillier/pages/3331881224
   #   Step 8  https://nvidia.atlassian.net/wiki/spaces/~fguillier/pages/3331881337
   #   Step 9  cluster-wide CC mode is ON by default — no patch needed
   #   Step 10 https://nvidia.atlassian.net/wiki/spaces/~fguillier/pages/3336434268
   # ============================================================
   - name: Install Kata + GPU Operator for Confidential Computing (Intel TDX / AMD SNP)
     when: "confidential_computing == true and enable_gpu_operator == true and microk8s == false and enable_mig == false and enable_vgpu == false and enable_rdma == false and enable_gds == false and enable_secure_boot == false and cns_nvidia_driver == false"
     block:
       - name: CoCo | Detect CPU vendor (Intel TDX vs AMD SNP)
         shell: grep -m1 vendor_id /proc/cpuinfo | awk '{print $3}'
         register: coco_cpu_vendor
         changed_when: false

       - name: CoCo | Report detected CC vendor and runtimeClass
         debug:
           msg: |
             CC vendor detected: {{ coco_cpu_vendor.stdout }}
             Workload runtimeClassName will be:
               {{ 'kata-qemu-nvidia-gpu-tdx' if coco_cpu_vendor.stdout == 'GenuineIntel' else ('kata-qemu-nvidia-gpu-snp' if coco_cpu_vendor.stdout == 'AuthenticAMD' else '(unsupported vendor — workload will fail)') }}

       - name: CoCo | WARN if CPU vendor is not Intel or AMD
         when: coco_cpu_vendor.stdout != 'GenuineIntel' and coco_cpu_vendor.stdout != 'AuthenticAMD'
         debug:
           msg: "WARNING: CPU vendor '{{ coco_cpu_vendor.stdout }}' is not supported for CoCo. Expected GenuineIntel (TDX) or AuthenticAMD (SNP). Continuing install but CoCo workloads will not run."

       - name: CoCo | Label nodes with vm-passthrough (Step 7)
         shell: kubectl label nodes --all nvidia.com/gpu.workload.config=vm-passthrough --overwrite
         retries: 5
         delay: 5
         register: label_vm_passthrough
         until: label_vm_passthrough is succeeded

       # The Kata runtime classes use vendor-specific NFD labels in their
       # nodeSelector: kata-qemu-nvidia-gpu-tdx looks for
       #   intel.feature.node.kubernetes.io/tdx=true
       # and kata-qemu-nvidia-gpu-snp looks for
       #   amd.feature.node.kubernetes.io/snp=true
       # NFD's built-in detection sets feature.node.kubernetes.io/cpu-security.*
       # but does NOT set the vendor-prefixed label on AMD (Intel ships it via
       # intel-device-plugins). Apply it ourselves so workloads schedule.
       - name: CoCo | Label node with vendor NFD label for runtimeClass selector
         when: coco_cpu_vendor.stdout == 'AuthenticAMD' or coco_cpu_vendor.stdout == 'GenuineIntel'
         shell: |
           kubectl label nodes --all \
             {{ 'amd.feature.node.kubernetes.io/snp=true' if coco_cpu_vendor.stdout == 'AuthenticAMD' else 'intel.feature.node.kubernetes.io/tdx=true' }} \
             --overwrite
         retries: 5
         delay: 5
         register: label_vendor_nfd
         until: label_vendor_nfd is succeeded

       - name: CoCo | Install Kata via kata-deploy Helm chart (Step 7)
         shell: |
           helm install kata-deploy oci://ghcr.io/kata-containers/kata-deploy-charts/kata-deploy \
             --namespace kata-system --create-namespace \
             --set nfd.enabled=false \
             --wait --timeout 10m \
             --version 3.29.0
         retries: 3
         delay: 10
         register: install_kata_deploy
         until: install_kata_deploy is succeeded

       - name: CoCo | Wait for kata-deploy pods ready
         shell: kubectl -n kata-system wait --for=condition=Ready pod -l name=kata-deploy --timeout=600s
         retries: 3
         delay: 10
         register: wait_kata_ready
         until: wait_kata_ready is succeeded
         failed_when: false

       - name: CoCo | Install GPU Operator with sandboxWorkloads mode=kata (Step 8)
         shell: |
           helm repo add nvidia https://helm.ngc.nvidia.com/nvidia 2>/dev/null || true
           helm repo update
           helm upgrade --install gpu-operator --wait --timeout 30m \
             -n gpu-operator --create-namespace \
             nvidia/gpu-operator \
             --set sandboxWorkloads.enabled=true \
             --set sandboxWorkloads.mode=kata \
             --set sandboxWorkloads.defaultWorkload=vm-passthrough \
             --set nfd.enabled=true \
             --set nfd.nodefeaturerules=true \
             --version=v{{ gpu_operator_version }}
         retries: 3
         delay: 10
         register: install_gpu_operator_coco
         until: install_gpu_operator_coco is succeeded

       - name: CoCo | Set kubelet runtimeRequestTimeout=1200s (Step 10)
         become: true
         ansible.builtin.lineinfile:
           path: /var/lib/kubelet/config.yaml
           regexp: '^runtimeRequestTimeout:'
           line: 'runtimeRequestTimeout: 1200s'
           create: no
           backup: yes
         register: kubelet_timeout_changed

       # CoCo also requires the following kubelet feature gates per
       # https://docs.nvidia.com/datacenter/cloud-native/confidential-containers/latest/confidential-containers-deploy.html
       #   KubeletPodResourcesGet: true     - lets sandbox device plugin enumerate GPUs
       #   RuntimeClassInImageCriApi: true  - lets the CRI honor runtimeClass during image pull
       # blockinfile keeps it idempotent across re-runs.
       - name: CoCo | Ensure kubelet feature gates for CoCo (Step 10)
         become: true
         ansible.builtin.blockinfile:
           path: /var/lib/kubelet/config.yaml
           marker: "# {mark} ANSIBLE MANAGED CoCo featureGates"
           block: |
             featureGates:
               KubeletPodResourcesGet: true
               RuntimeClassInImageCriApi: true
         register: kubelet_featuregates_changed

       - name: CoCo | Restart kubelet if timeout or featureGates changed (Step 10)
         become: true
         when: kubelet_timeout_changed.changed or kubelet_featuregates_changed.changed
         systemd:
           name: kubelet
           state: restarted

   # ============================================================
   # Confidential Computing — Validation (Step 11)
   # Ref: https://nvidia.atlassian.net/wiki/spaces/~fguillier/pages/3331971821
   # Vendor-aware: TDX -> kata-qemu-nvidia-gpu-tdx, SNP -> kata-qemu-nvidia-gpu-snp
   # Gated on cns_validation == true. Failures soft — debug message only.
   # ============================================================
   - name: CoCo Validation — VectorAdd test pod
     when: "confidential_computing == true and enable_gpu_operator == true and cns_validation == true"
     block:
       - name: CoCo Validation | Detect CPU vendor for runtimeClass
         shell: grep -m1 vendor_id /proc/cpuinfo | awk '{print $3}'
         register: coco_val_vendor
         changed_when: false

       - name: CoCo Validation | Pick runtimeClassName by vendor
         set_fact:
           coco_runtime_class: "{{ 'kata-qemu-nvidia-gpu-tdx' if coco_val_vendor.stdout == 'GenuineIntel' else 'kata-qemu-nvidia-gpu-snp' }}"

       - name: CoCo Validation | Write cuda-vectoradd-kata manifest
         copy:
           dest: "{{ ansible_facts['user_dir'] }}/cuda-vectoradd-kata.yaml"
           content: |
             apiVersion: v1
             kind: Pod
             metadata:
               name: cuda-vectoradd-kata
               namespace: default
             spec:
               runtimeClassName: {{ coco_runtime_class }}
               restartPolicy: Never
               containers:
                 - name: cuda-vectoradd
                   image: "nvcr.io/nvidia/k8s/cuda-sample:vectoradd-cuda12.5.0-ubuntu22.04"
                   resources:
                     limits:
                       nvidia.com/pgpu: "1"
                       memory: 16Gi

       - name: CoCo Validation | Apply VectorAdd pod
         shell: "kubectl apply -f {{ ansible_facts['user_dir'] }}/cuda-vectoradd-kata.yaml"

       - name: CoCo Validation | Wait for VectorAdd Succeeded (5 min)
         shell: kubectl wait --for=jsonpath='{.status.phase}'=Succeeded pod/cuda-vectoradd-kata -n default --timeout=300s
         register: coco_val_wait
         failed_when: false
         changed_when: false

       - name: CoCo Validation | Capture pod logs
         shell: kubectl logs cuda-vectoradd-kata -n default
         register: coco_val_logs
         failed_when: false
         changed_when: false

       - name: CoCo Validation | Report result
         debug:
           msg: |
             VectorAdd test (runtimeClass={{ coco_runtime_class }}):
             {{ coco_val_logs.stdout | default('(no logs)') }}

       - name: CoCo Validation | Cleanup VectorAdd pod
         shell: kubectl delete pod cuda-vectoradd-kata -n default --ignore-not-found
         changed_when: false
         failed_when: false

   - name: Create namespace and registry secret
     when: "confidential_computing == false and enable_gpu_operator == true and cns_nvidia_driver == false and ngc_registry_password != ''"
     shell: "{{ item }}"
     with_items:
       - kubectl create namespace nvidia-gpu-operator
       - kubectl create secret docker-registry ngc-secret --docker-server='https://nvcr.io' --docker-username='{{ ngc_registry_username }}' --docker-password='{{ ngc_registry_password }}' -n nvidia-gpu-operator
     retries: 5
     delay: 5
     register: create_namespace_secret
     until: create_namespace_secret is succeeded

   - name: Installing the GPU Operator with NVIDIA Docker on NVIDIA Cloud Native Stack
     when: "confidential_computing == false and enable_gpu_operator == true and cns_docker == true and cns_nvidia_driver == false and  enable_mig == false and enable_vgpu == false and enable_rdma == false and ngc_registry_password == '' and container_runtime != 'cri-dockerd'"
     shell: helm upgrade --install gpu-operator --version {{ gpu_operator_version }} --values {{ ansible_facts['user_dir'] }}/values.yaml --create-namespace --namespace nvidia-gpu-operator '{{ gpu_operator_helm_chart }}' --timeout 30m --wait
     retries: 5
     delay: 5
     register: install_gpu_operator_docker
     until: install_gpu_operator_docker is succeeded

   - name: Installing the GPU Operator with NVIDIA Docker on NVIDIA Cloud Native Stack with cri-dockerd runtime
     when: "confidential_computing == false and enable_gpu_operator == true and cns_docker == true and cns_nvidia_driver == false and  enable_mig == false and enable_vgpu == false and enable_rdma == false and ngc_registry_password == '' and container_runtime == 'cri-dockerd'"
     shell: helm upgrade --install gpu-operator --version {{ gpu_operator_version }} --values {{ ansible_facts['user_dir'] }}/values.yaml --create-namespace --namespace nvidia-gpu-operator '{{ gpu_operator_helm_chart }}' --set toolkit.env[0].name=CONTAINERD_RUNTIME_CLASS --set toolkit.env[0].value=nvidia --set toolkit.env[1].name=CONTAINERD_SET_AS_DEFAULT --set-string toolkit.env[1].value=false --set toolkit.env[2].name=NVIDIA_RUNTIME_SET_AS_DEFAULT --set-string toolkit.env[2].value=true --timeout 30m --wait
     retries: 5
     delay: 5
     register: install_gpu_operator_docker_cri_dockerd
     until: install_gpu_operator_docker_cri_dockerd is succeeded

   - name: Installing the GPU Operator with NVIDIA Host Driver on NVIDIA Cloud Native Stack
     when: "confidential_computing == false and enable_gpu_operator == true and cns_docker == false and cns_nvidia_driver == true and enable_mig == false and enable_vgpu == false and enable_rdma == false and ngc_registry_password == '' and container_runtime != 'cri-dockerd'"
     shell: helm upgrade --install gpu-operator --version {{ gpu_operator_version }} --values {{ ansible_facts['user_dir'] }}/values.yaml --create-namespace --namespace nvidia-gpu-operator '{{ gpu_operator_helm_chart }}' --set driver.enabled=false --timeout 30m --wait
     retries: 5
     delay: 5
     register: install_gpu_operator_host_driver
     until: install_gpu_operator_host_driver is succeeded

