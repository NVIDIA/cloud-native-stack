- hosts: master
  gather_facts: yes
  vars_files:
    - cns_values.yaml
  tasks:

   - name: Get Nvidia Tegra Release
     shell: uname -r | awk -F'-' '{print $2}'
     register: release

   - name: MicroK8s Reset
     ignore_errors: true
     shell: microk8s.reset --destroy-storage
     become: true
     when: microk8s == true

   - name: remove Microk8s snap
     ignore_errors: true
     snap:
       name: microk8s
       state: absent
     become: true
     when: microk8s == true

   - name: remove Microk8s snap
     ignore_errors: true
     apt:
       name: snapd
       state: absent
       purge: true
       autoremove: yes
     become: true
     when: microk8s == true and ansible_facts['distribution'] == 'Ubuntu'

   - name: Install Snapd on RHEL
     when: ansible_facts['distribution'] == 'RedHat' and microk8s == true
     shell: "{{ item }}"
     become: true
     ignore_errors: true
     with_items:
       - yum remove snapd -y
       - yum autoremove -y
       - rm -rf /var/lib/snapd/snap /snap

   - name: add kubectl alias for Microk8s
     when: microk8s == true
     become: false
     lineinfile:
       path: '{{ lookup("env", "HOME") }}/.bashrc'
       regexp: '^alias kubectl='
       line: 'alias kubectl="microk8s kubectl"'
       state: absent

   - name: remove helm alias for Microk8s
     when: microk8s == true
     become: false
     lineinfile:
       path: '{{ lookup("env", "HOME") }}/.bashrc'
       regexp: '^alias helm='
       line: 'alias helm="microk8s helm"'
       state: absent

   - name: remove snap from bashrc
     when: microk8s == true
     become: false
     lineinfile:
       path: "{{ ansible_facts['user_dir'] }}/.bashrc"
       regexp: '.*\/snap.*'
       state: absent

   - name: add nvidia-smi alias
     become: false
     lineinfile:
       path: "{{ ansible_facts['user_dir'] }}/.bashrc"
       regexp: '^alias nvidia-smi='
       line: "alias nvidia-smi='sudo chroot /run/nvidia/driver nvidia-smi'"
       state: absent

   - set_fact:
       release: "{{ release.stdout }}"

   - name: disable mig
     ignore_errors: true
     shell: nvidia-smi -mig 0
     when: nvidia_driver_mig == true
     args:
       executable: /bin/bash

   - name: Uninstall the GPU Operator with MIG
     ignore_errors: true
     shell: |
       kubectl label nodes --all nvidia.com/mig.config=all-disabled --overwrite
       sleep 5
       config_state=$(kubectl describe nodes  |grep mig.config.state |head -n1 | awk -F'=' '{print $2}')
       while [ $config_state != "success" ]
       do
         sleep 5
         config_state=$(kubectl describe nodes  |grep mig.config.state | head -n1 |awk -F'=' '{print $2}')
       done
     when: "enable_mig == true and cns_version >= 4.1 and release != 'tegra' and microk8s == false"
     #failed_when: false
     async: 600
     args:
       executable: /bin/bash

   - name: Uninstall Helm Charts on NVIDIA Cloud Native Stack
     ignore_errors: true
     when:  release != 'tegra' and microk8s == false
     async: 360
     shell: |
       count=$(helm ls -A | egrep 'gpu-operator|network-operator|kata-deploy' | grep -v NAME | wc -l)
       if [[ $count > 0 ]]; then
        for name in `helm ls -A | awk '{print $1}' | grep -v NAME`
        do
          for namespace in `helm ls -A | grep $name |  awk '{print $2}' | grep -v NAMESPACE`
            do
              timeout 180s helm del $name -n $namespace --wait || timeout 60s helm del $name -n $namespace --no-hooks || true
              attempts=0
              pods=$(kubectl get pods -n $namespace | grep -v NAME | wc -l)
              while [ $pods != 0 ] && [ $attempts -lt 12 ]
              do
                sleep 10
                attempts=$((attempts + 1))
                pods=$(kubectl get pods -n $namespace | grep -v NAME | wc -l)
              done
            done
        done
       fi
     args:
      executable: /bin/bash

- hosts: all
  gather_facts: yes
  become: true
  vars_files:
    - cns_values.yaml
  tasks:

   - name: Reset Kubernetes component
     when: container_runtime == 'cri-o' and microk8s == false
     shell: "timeout 45 kubeadm reset --cri-socket=unix:///var/run/crio/crio.sock --force"
     failed_when: false
     no_log: True

   - name: Reset Kubernetes component
     when: container_runtime == 'cri-dockerd' and microk8s == false
     shell: "timeout 45 kubeadm reset --cri-socket=unix:///run/cri-dockerd.sock --force"
     failed_when: false
     no_log: True

   - name: Reset Kubernetes component
     when: container_runtime == 'containerd' and microk8s == false
     shell: "timeout 45 kubeadm reset --cri-socket=unix:///run/containerd/containerd.sock --force"
     failed_when: false
     no_log: True

   - name: Reset iptables default policies to ACCEPT
     ansible.builtin.shell: "{{ item }}"
     become: true
     with_items:
       - iptables -P INPUT ACCEPT
       - iptables -P FORWARD ACCEPT
       - iptables -P OUTPUT ACCEPT
     ignore_errors: yes
     failed_when: false
     
   - name: IPTables Cleanup
     ignore_errors: yes
     failed_when: false
     become: true
     shell: "{{ item }}"
     with_items:
       - iptables -F
       - ip link delete cni0
       - ip link delete flannel.1

   - name: Check docker is installed
     shell: /usr/bin/docker
     register: docker_exists
     no_log: true
     failed_when: false
     args:
      executable: /bin/bash

   - name: Remove all docker images and cache
     when: "cns_docker == true and docker_exists.rc == 0 or container_runtime == 'cri-dockerd' and docker_exists.rc == 0"
     ignore_errors: yes
     failed_when: false
     no_log: True
     shell: "{{ item }}"
     with_items:
       - docker system prune -af --volumes || true
       - docker rm -vf $(docker ps -aq) || true
       - docker image prune -af || true

   - name: Stopping and disable the required services
     ignore_errors: yes
     become: true
     systemd_service:
       name: "{{ item }}"
       state: stopped
       enabled: false
       daemon_reload: yes
     failed_when: false
     with_items:
       - docker
       - kubelet
       - containerd
       - crio
       - cri-o
       - cri-docker

   - name: Remove Kubernetes packages for Ubuntu
     when: "ansible_facts['distribution'] == 'Ubuntu' and cns_version >= 4.0 and microk8s == false"
     ignore_errors: yes
     apt:
       name: "{{ item }}"
       state: absent
       purge: yes
       force: yes
       autoremove: yes
       allow_change_held_packages: true
     loop:
       - kubeadm
       - kubelet
       - kubectl

   - name: Remove CRI-O packages for Ubuntu
     when: "ansible_facts['distribution'] == 'Ubuntu' and cns_version >= 4.0 and container_runtime == 'cri-o' and microk8s == false"
     ignore_errors: yes
     failed_when: false
     apt:
       name: "{{ item }}"
       state: absent
       purge: yes
       force: yes
       autoremove: yes
       allow_change_held_packages: true
     loop:
       - cri-o*
       - cri-o-runc*

   - name: Remove Docker and Kubernetes packages for Ubuntu
     when: "cns_docker == true and ansible_facts['distribution'] == 'Ubuntu' or cns_version <= 3.1 and ansible_facts['distribution'] == 'Ubuntu' or container_runtime == 'cri-dockerd' "
     ignore_errors: yes
     failed_when: false
     apt:
       name: "{{ item }}"
       state: absent
       purge: yes
       force: yes
       autoremove: yes
       allow_change_held_packages: true
     loop:
       - kubeadm
       - kubelet
       - kubectl
       - docker*
       - docker-ce*
       - containerd*
       - nvidia-docker*

   - name: Remove NVIDIA Docker for Cloud Native Stack Developers on Ubuntu
     when: "cns_docker == true and ansible_facts['distribution'] == 'Ubuntu' and microk8s == false or cns_nvidia_driver == true and ansible_facts['distribution'] == 'Ubuntu' and microk8s == false"
     ignore_errors: yes
     apt:
       name: "{{ item }}"
       state: absent
       purge: yes
       force: yes
       autoremove: yes
       allow_change_held_packages: true
     loop:
       - cuda-drivers
       - nvidia-driver-*
       - nvidia-dkms-*
       - nvidia-utils-*
       - nvidia-*
       - libnvidia*
       - cuda
       - cuda-*
       - cuda-keyring
       - libcuda*
       - nvidia-container*
       - libnvidia-container*

   - name: Remove NVIDIA Docker for Cloud Native Stack Developers on Redhat
     when: "cns_docker == true and ansible_facts['distribution'] == 'RedHat' and microk8s == false or cns_nvidia_driver == true and ansible_facts['distribution'] == 'RedHat' and microk8s == false"
     ignore_errors: yes
     yum:
       name: "{{ item }}"
       state: absent
     loop:
       - '@nvidia-driver:525-dkms'
       - '@nvidia-driver:535-dkms'
       - '@nvidia-driver:550-dkms'
       - 'nvidia-container*'
       - 'nvidia-docker*'

   - name: Unmount NVIDIA driver container mounts
     when: microk8s == false
     shell: |
       if mountpoint -q /run/nvidia/driver; then
         findmnt -Rno TARGET /run/nvidia/driver | awk '{ print length, $0 }' | sort -rn | cut -d' ' -f2- | xargs -r -n1 umount -l
       fi
     become: true
     ignore_errors: yes
     failed_when: false

   - name: Cleanup orphaned CNS pod processes
     when: microk8s == false
     shell: |
       for process_name in nvidia-device-plugin nvidia-mig-manager gpu-feature-discovery dcgm-exporter fluent-bit prometheus prometheus-config-reloader; do
         pkill -9 -x "${process_name}" || true
       done
       pkill -9 -f '/workspace/app|k8s-nim-operator|elastic-operator|istio|knative|kserve|volcano' || true
     become: true
     ignore_errors: yes
     failed_when: false

   - name: unload NVIDIA
     when: microk8s == false
     shell: |
       if [ -x /usr/bin/nvidia-uninstall ]; then
         /usr/bin/nvidia-uninstall --silent || true
       fi
       if command -v lsof >/dev/null 2>&1 && ls /dev/nvidia* >/dev/null 2>&1; then
         lsof /dev/nvidia* | awk 'NR > 1 {print $2}' | sort -u | xargs -r kill -9 || true
       fi
       for module in nvidia_uvm nvidia_drm nvidia_modeset nvidia; do
         rmmod "${module}" || true
       done
     become: true
     ignore_errors: yes
     failed_when: false

   - name: Remove dependencies that are no longer required
     when: "ansible_facts['distribution'] == 'Ubuntu'"
     apt:
      autoremove: yes

   - name: Remove dependencies that are no longer required
     when: "ansible_facts['distribution'] == 'RedHat'"
     yum:
      autoremove: yes

   - name: Remove installed packages for RHEL/CentOS
     when:  "ansible_facts['distribution'] in ['RedHat', 'CentOS']"
     ignore_errors: yes
     yum:
       name: "{{ item }}"
       state: absent
     loop:
       - kubectl
       - kubeadm
       - kubelet
       - docker*
       - cri*

   - name: Cleanup Containerd Process
     shell: kill -9 $( ps -ef|grep containerd | awk '{print $2}')
     no_log: true
     failed_when: false
     ignore_errors: yes

   - name: Stop lingering CRI container scopes
     when: microk8s == false
     shell: |
       scopes=$(systemctl list-units --type=scope --state=running --no-legend 'cri-containerd-*' | awk '{print $1}')
       if [ -n "${scopes}" ]; then
         systemctl stop ${scopes} || true
       fi
     become: true
     ignore_errors: yes
     failed_when: false

   - name: Stop Fluent Bit service
     when: microk8s == false
     systemd_service:
       name: fluent-bit
       state: stopped
       enabled: false
       daemon_reload: yes
     become: true
     ignore_errors: yes
     failed_when: false

   - name: Cleanup orphaned CNS pod processes after runtime stop
     when: microk8s == false
     shell: |
       for process_name in nvidia-device-plugin nvidia-mig-manager gpu-feature-discovery dcgm-exporter fluent-bit prometheus prometheus-config-reloader; do
         pkill -9 -x "${process_name}" || true
       done
       pkill -9 -f '/workspace/app|k8s-nim-operator|elastic-operator|istio|knative|kserve|volcano' || true
     become: true
     ignore_errors: yes
     failed_when: false

   - name: NVIDIA FS Module Cleanup
     ignore_errors: yes
     failed_when: false
     become: true
     shell: rmmod nvidia_fs

   - name: Cleanup NVIDIA runtime state directories
     when: microk8s == false
     ignore_errors: yes
     file:
       path: "{{ item }}"
       state: absent
     with_items:
        - /usr/lib/nvidia
        - /usr/local/nvidia
        - /run/nvidia

   - name: Cleanup Directories for Cloud Native Stack Developers
     when: " cns_docker == true and cns_nvidia_driver == true or cns_version <= 3.1 or container_runtime == 'cri-dockerd'"
     ignore_errors: yes
     file:
       path: "{{ item }}"
       state: absent
     with_items:
        - /etc/docker
        - /var/lib/docker
        - /var/run/docker
        - /run/docker.sock
        - /run/docker
        - /usr/lib/nvidia
        - /usr/local/nvidia
        - /run/nvidia
        - /etc/apt/sources.list.d/nvidia-docker
        - /etc/apt/sources.list.d/docker

   - name: Cleanup Directories
     ignore_errors: yes
     shell: rm -rf "{{ item }}"
     with_items:
#        - /var/lib/containerd
#        - /run/containerd
#        - /opt/containerd
        - /etc/containerd
        - /var/run/docker.pid
        - /usr/local/sbin/runc
        - /usr/local/bin/crictl
        - /etc/crictl.yaml
        - /usr/local/bin/containerd
        - /usr/local/bin/containerd-s*
        - /var/lib/etcd
        - /var/lib/containerd
        - /etc/kubernetes
        - /etc/apt/sources.list.d/kubernetes.list
        - /etc/apt/sources.list.d/devel:kubic:libcontainers:stable.list
        - /etc/apt/sources.list.d/devel:kubic:libcontainers:stable:cri-o:{{ k8s_version }}.list
        - /etc/apt/sources.list.d/libnvidia-container.list
        - /etc/apt/keyrings/libcontainers-crio-archive-keyring.gpg
        - /etc/apt/keyrings/libcontainers-archive-keyring.gpg
        - /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        - /etc/apt/sources.list.d/nvidia-container-toolkit.list
        - /usr/local/bin/helm
        - /var/lib/crio
        - /etc/crio
        - /usr/local/bin/crio
        - /var/log/containers
        - /etc/apt/sources.list.d/devel*
        - /etc/sysctl.d/99-kubernetes-cri.conf
        - /etc/modules-load.d/containerd.conf
        - /etc/modules-load.d/crio.conf
        - /etc/apt/trusted.gpg.d/libcontainers*
        - /etc/default/kubelet
        - /etc/cni/net.d
        - /etc/systemd/system/containerd.service.d/http-proxy.conf
        - /var/log/pods
        - /opt/local-path-provisioner
        - /usr/local/bin/cri-dockerd
        - /etc/systemd/system/cri-docker.service
        - /etc/systemd/system/docker.service
        - /usr/lib/systemd/system/docker.service
        - /etc/systemd/system/cri-docker.socket
        - /etc/apt/sources.list.d/libnvidia-container.list
        - /etc/apt/sources.list.d/nvidia-container-toolkit.list
        - /etc/apt/sources.list.d/docker.list
        - /etc/apt/sources.list.d/cri-o.list.list
        - /etc/yum.repos.d/cri-o.repo
        - /etc/yum.repos.d/devel\:kubic\:libcontainers\:stable\:cri-o\:{{ k8s_version }}.repo
        - /etc/yum.repos.d/devel\:kubic\:libcontainers\:stable.repo
        - /etc/yum.repos.d/nvidia-container-toolkit.repo
        - /etc/yum.repos.d/nvidia-docker.repo
        - /etc/yum.repos.d/docker-ce.repo
        - /etc/yum.repos.d/kubernetes.repo
        - /var/cache/dnf/
        - /opt/cni/bin

   - name: Cleanup Directories
     when: microk8s == true
     ignore_errors: yes
     shell: umount $(mount | grep snap | awk '{print $3}'); rm -rf "{{ item }}"
     with_items:
        - /var/snap
        - /var/lib/snapd/snap
        - /snap

   # ============================================================
   # Confidential Computing — Intel TDX cleanup
   # Reverses what cns-installation.yaml's TDX block did:
   #   - Removes 'nohibernate' from GRUB_CMDLINE_LINUX_DEFAULT
   #   - Deletes /etc/modprobe.d/tdx.conf (kvm_intel tdx=1)
   # ============================================================
   - name: TDX cleanup | Detect CPU vendor
     when: confidential_computing == true and microk8s == false
     shell: grep -m1 vendor_id /proc/cpuinfo | awk '{print $3}'
     register: cpu_vendor_uninstall
     changed_when: false
     failed_when: false

   - name: TDX cleanup | Remove nohibernate from GRUB_CMDLINE_LINUX_DEFAULT
     when: confidential_computing == true and microk8s == false and cpu_vendor_uninstall.stdout == 'GenuineIntel'
     ansible.builtin.replace:
       path: /etc/default/grub
       # Strip ' nohibernate' OR 'nohibernate ' OR sole 'nohibernate' from the value.
       regexp: '^(GRUB_CMDLINE_LINUX_DEFAULT="[^"]*?)\s?nohibernate\s?([^"]*")$'
       replace: '\1\2'
       backup: yes
     register: tdx_grub_cleanup

   - name: TDX cleanup | update-grub after removing nohibernate
     when: confidential_computing == true and microk8s == false and cpu_vendor_uninstall.stdout == 'GenuineIntel' and tdx_grub_cleanup.changed
     command: update-grub

   - name: TDX cleanup | Remove /etc/modprobe.d/tdx.conf
     when: confidential_computing == true and microk8s == false and cpu_vendor_uninstall.stdout == 'GenuineIntel'
     ansible.builtin.file:
       path: /etc/modprobe.d/tdx.conf
       state: absent
     register: tdx_modprobe_cleanup

   - name: Reboot the system
     when: >
       (ansible_connection | default('ssh')) != 'local' and
       (cns_nvidia_driver == true and microk8s == false)
       or
       ((ansible_connection | default('ssh')) != 'local' and
       confidential_computing == true and microk8s == false and cpu_vendor_uninstall.stdout == 'GenuineIntel' and (tdx_grub_cleanup.changed or tdx_modprobe_cleanup.changed))
     reboot:
       reboot_timeout: 900
